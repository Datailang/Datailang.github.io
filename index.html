<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlossBot — AI Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #080b10;
      --bg-glow-1: rgba(0,212,170,0.12);
      --bg-glow-2: rgba(0,152,255,0.12);
      --surface:   #0e1218;
      --surface-2: rgba(255,255,255,0.025);
      --border:    rgba(255,255,255,0.07);
      --accent:    #00d4aa;
      --accent2:   #0098ff;
      --text:      #e2e8f0;
      --muted:     #4a5568;
      --user-bg:   linear-gradient(135deg, #0098ff, #00d4aa);
      --ai-bg:     rgba(255,255,255,0.05);
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-mono:    'DM Mono', monospace;
      --font-body:    'Lato', sans-serif;
    }
    html, body {
      height: 100%;
      background:
        radial-gradient(70% 50% at 0% 0%, var(--bg-glow-1), transparent 60%),
        radial-gradient(60% 45% at 100% 100%, var(--bg-glow-2), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-body);
    }

    #visitor-view {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px; position: relative; overflow: hidden;
    }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
    .orb1 { width: 500px; height: 500px; background: rgba(0,212,170,0.08); top: -150px; left: -150px; }
    .orb2 { width: 400px; height: 400px; background: rgba(0,152,255,0.08); bottom: -100px; right: -100px; }

    .chat-shell {
      width: 100%; max-width: 460px; display: flex; flex-direction: column;
      background: linear-gradient(165deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)) , var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,212,170,0.05);
      position: relative; z-index: 1;
      backdrop-filter: blur(8px);
      animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .chat-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(0,212,170,0.16), transparent 30%, transparent 70%, rgba(0,152,255,0.18));
      opacity: .35;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .bot-avatar {
      width: 44px; height: 44px; border-radius: 14px; position: relative;
      background: linear-gradient(135deg, #00d4aa, #0098ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,212,170,0.3);
    }
    .online-ring {
      position: absolute; bottom: -2px; right: -2px;
      width: 13px; height: 13px; border-radius: 50%;
      background: #22c55e; border: 2.5px solid var(--surface);
    }
    .bot-name { font-family: var(--font-display); font-size: 17px; color: #fff; line-height: 1.2; }
    .bot-sub  { font-size: 11px; color: var(--accent); font-family: var(--font-mono); margin-top: 2px; letter-spacing: 0.5px; }
    .header-tag {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
      color: var(--accent); border: 1px solid rgba(0,212,170,0.3);
      border-radius: 6px; padding: 3px 8px;
    }

    .msg-area {
      flex: 1; overflow-y: auto; padding: 24px 18px;
      min-height: 380px; max-height: 460px; scroll-behavior: smooth;
      background: linear-gradient(to bottom, rgba(255,255,255,0.015), transparent 16%, transparent 84%, rgba(255,255,255,0.012));
    }
    .msg-area::-webkit-scrollbar { width: 3px; }
    .msg-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .msg-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }

    .bubble-avatar {
      width: 28px; height: 28px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg,#00d4aa,#0098ff);
      display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .bubble { max-width: 72%; display: flex; flex-direction: column; }
    .bubble-text {
      padding: 11px 15px; border-radius: 16px; font-size: 14px;
      line-height: 1.65; word-break: break-word;
    }
    .msg-row.ai   .bubble-text { background: var(--ai-bg); color: var(--text); border-radius: 4px 16px 16px 16px; border: 1px solid var(--border); }
    .msg-row.user .bubble-text { background: var(--user-bg); color: #fff; border-radius: 16px 16px 4px 16px; }
    .bubble-time { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: var(--font-mono); }
    .msg-row.user .bubble { align-items: flex-end; }

    .typing-dots { display: flex; gap: 4px; padding: 14px 16px; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.5); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .input-bar {
      display: flex; align-items: flex-end; gap: 10px;
      padding: 12px 14px; border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
    }
    .input-bar textarea {
      flex: 1; resize: none; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 14px; font-family: var(--font-body);
      padding: 10px 14px; outline: none; line-height: 1.5; max-height: 120px;
      transition: border-color .2s;
    }
    .input-bar textarea:focus { border-color: rgba(0,212,170,0.4); }
    .input-bar textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 12px; border: none; cursor: pointer;
      background: linear-gradient(135deg, #00d4aa, #0098ff);
      color: #fff; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .2s, transform .15s;
    }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { transform: scale(1.05); }

    .chat-footer {
      text-align: center; font-size: 11px; color: var(--muted);
      font-family: var(--font-mono); padding: 10px 0 14px; letter-spacing: 0.3px;
      background: var(--surface-2);
      border-top: 1px solid var(--border);
    }

    .conn-banner {
      display: none; align-items: center; justify-content: center; gap: 6px;
      padding: 8px; background: rgba(239,68,68,0.1); border-bottom: 1px solid rgba(239,68,68,0.2);
      font-size: 12px; color: #f87171; font-family: var(--font-mono);
    }
    .conn-banner.show { display: flex; }

    /* ── Admin ── */
    #admin-view { display: none; min-height: 100vh; background: #070a0f; font-family: var(--font-body); }
    .admin-layout { display: flex; height: 100vh; }

    .admin-sidebar {
      width: 240px; background: #0b0e15; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 24px 16px; flex-shrink: 0;
    }
    .sidebar-logo { font-family: var(--font-display); font-size: 22px; color: var(--accent); margin-bottom: 6px; letter-spacing: -0.5px; }
    .sidebar-subtitle { font-size: 11px; color: var(--muted); font-family: var(--font-mono); margin-bottom: 28px; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 10px; font-size: 14px; cursor: pointer;
      color: var(--muted); transition: all .15s;
    }
    .nav-item.active { background: rgba(0,212,170,0.1); color: var(--accent); }
    .nav-item-left { display: flex; align-items: center; gap: 8px; }
    .visitor-badge {
      background: var(--accent); color: #000; font-size: 10px; font-weight: 700;
      border-radius: 10px; padding: 1px 7px; font-family: var(--font-mono);
      min-width: 20px; text-align: center;
      animation: pulse-badge 2s ease-in-out infinite;
    }
    @keyframes pulse-badge {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,212,170,0.4); }
      50% { box-shadow: 0 0 0 5px rgba(0,212,170,0); }
    }
    .sidebar-status {
      margin-top: auto; font-size: 12px; font-family: var(--font-mono);
      color: var(--muted); padding-top: 16px; border-top: 1px solid var(--border);
    }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.disconnected { background: #ef4444; }

    .admin-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .admin-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px; border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.01); flex-shrink: 0; gap: 10px;
    }
    .admin-topbar-title { font-size: 18px; font-weight: 700; color: #fff; }
    .admin-topbar-sub { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: var(--font-mono); }
    .preview-btn {
      font-size: 12px; color: var(--accent2); border: 1px solid rgba(0,152,255,0.3);
      border-radius: 8px; padding: 6px 14px; cursor: pointer; text-decoration: none;
      font-family: var(--font-mono); transition: background .15s;
    }
    .preview-btn:hover { background: rgba(0,152,255,0.08); }

    .admin-msg-area { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .admin-msg-area::-webkit-scrollbar { width: 3px; }
    .admin-msg-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 12px;
      color: var(--muted); font-family: var(--font-mono); font-size: 13px; text-align: center;
    }
    .empty-icon { font-size: 48px; opacity: 0.4; }

    .admin-msg-row { display: flex; gap: 12px; margin-bottom: 18px; }
    .admin-msg-row.from-admin { flex-direction: row-reverse; }
    .admin-avatar {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .admin-avatar.visitor  { background: rgba(255,255,255,0.06); }
    .admin-avatar.operator { background: linear-gradient(135deg,#00d4aa,#0098ff); }
    .admin-bubble-wrap { max-width: 65%; }
    .admin-bubble-meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-family: var(--font-mono); }
    .admin-msg-row.from-admin .admin-bubble-meta { text-align: right; }
    .admin-bubble-text { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .admin-msg-row.from-visitor .admin-bubble-text { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
    .admin-msg-row.from-admin   .admin-bubble-text { background: rgba(0,212,170,0.12); color: #a7f3d0; border: 1px solid rgba(0,212,170,0.2); }

    .admin-reply-area {
      padding: 16px 28px 20px; border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.01); flex-shrink: 0;
    }
    .reply-label {
      font-size: 11px; color: var(--muted); font-family: var(--font-mono);
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .reply-typing-hint { color: var(--accent); }
    .reply-input-row { display: flex; gap: 12px; align-items: flex-end; }
    .admin-textarea {
      flex: 1; resize: none; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 14px; font-family: var(--font-body);
      padding: 12px 14px; outline: none; line-height: 1.5; transition: border-color .2s;
    }
    .admin-textarea:focus { border-color: rgba(0,212,170,0.4); }
    .admin-textarea::placeholder { color: var(--muted); }
    .admin-send-btn {
      background: linear-gradient(135deg,#00d4aa,#0098ff);
      color: #000; font-weight: 700; font-size: 13px;
      border: none; border-radius: 12px; padding: 12px 22px;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      font-family: var(--font-mono); transition: opacity .2s;
    }
    .admin-send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .sys-event {
      text-align: center; font-size: 11px; color: var(--muted);
      font-family: var(--font-mono); margin: 8px 0 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .sys-event::before, .sys-event::after { content:''; flex:1; height:1px; background: var(--border); }

    /* ── Login View ── */
    #login-view {
      display: none; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--bg); position: relative; overflow: hidden;
    }
    #login-view.show { display: flex; }
    .login-shell {
      width: 100%; max-width: 360px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7);
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
      padding: 40px 32px;
    }
    .login-logo { text-align: center; font-size: 48px; margin-bottom: 12px; }
    .login-title {
      text-align: center; font-family: var(--font-display);
      font-size: 22px; color: #fff; margin-bottom: 6px;
    }
    .login-sub {
      text-align: center; font-size: 12px; color: var(--muted);
      font-family: var(--font-mono); margin-bottom: 32px;
    }
    .login-input {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 15px; font-family: var(--font-body);
      padding: 12px 16px; outline: none; margin-bottom: 14px;
      transition: border-color .2s; letter-spacing: 2px;
    }
    .login-input:focus { border-color: rgba(0,212,170,0.5); }
    .login-input::placeholder { letter-spacing: 0; color: var(--muted); }
    .login-btn {
      width: 100%; background: linear-gradient(135deg,#00d4aa,#0098ff);
      color: #000; font-weight: 700; font-size: 15px;
      border: none; border-radius: 12px; padding: 13px;
      cursor: pointer; font-family: var(--font-mono);
      transition: opacity .2s; margin-bottom: 12px;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .login-error {
      text-align: center; font-size: 12px; color: #f87171;
      font-family: var(--font-mono); min-height: 18px;
    }
    .login-shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-8px); }
      40%,80% { transform: translateX(8px); }
    }

    /* ── Web Search Toggle ── */
    .websearch-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 16px 10px;
      border-top: 1px solid var(--border);
      background: var(--surface-2);
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .ws-info {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
    }
    .ws-toggle {
      width: 40px;
      height: 22px;
      border-radius: 999px;
      cursor: pointer;
      background: #2d3748;
      position: relative;
      transition: background .2s;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .ws-toggle.on {
      background: #f59e0b;
      box-shadow: 0 0 12px rgba(245,158,11,0.35);
    }
    .ws-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4a5568;
      transition: all .2s;
    }
    .ws-toggle.on .ws-knob {
      left: 20px;
      background: #fff;
    }
    .ws-label {
      color: var(--muted);
      min-width: 42px;
      text-align: right;
      transition: color .2s;
    }
    .ws-label.on { color: #f59e0b; }
  </style>
</head>
<body>

<!-- ══════════════ LOGIN VIEW ══════════════ -->
<div id="login-view">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="login-shell">
    <div class="login-logo">🔐</div>
    <div class="login-title">FlossBot 后台</div>
    <div class="login-sub">OPERATOR CONSOLE · 请输入密码</div>
    <input class="login-input" id="login-pwd" type="password" placeholder="输入管理员密码" autocomplete="off" />
    <button class="login-btn" id="login-btn" onclick="doLogin()">进入后台 →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>


<!-- ══════════════ VISITOR VIEW ══════════════ -->
<div id="visitor-view">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="chat-shell">
    <div class="conn-banner" id="conn-banner">⚠ 连接中断，正在重连…</div>
    <div class="chat-header">
      <div class="header-left">
        <div class="bot-avatar">
          🤖
          <div class="online-ring"></div>
        </div>
        <div>
          <div class="bot-name">FlossBot</div>
          <div class="bot-sub">● ONLINE · 即时响应</div>
        </div>
      </div>
      <div class="header-tag">AI</div>
    </div>
    <div class="msg-area" id="msg-area"></div>
    <div class="websearch-bar" id="websearch-bar">
      <div class="ws-info">
        <span>🌐 联网搜索</span>
      </div>
      <div class="ws-info">
        <button onclick="toggleWebSearch()" id="ws-toggle" class="ws-toggle" aria-label="切换联网搜索" aria-pressed="false" type="button">
          <span id="ws-knob" class="ws-knob"></span>
        </button>
        <span id="ws-label" class="ws-label">已关闭</span>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="visitor-input" placeholder="输入消息，Enter 发送…" rows="1"></textarea>
      <button class="send-btn" id="send-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="chat-footer">🔒 端对端加密 &nbsp;·&nbsp; Powered by FlossBot v2</div>
  </div>
</div>

<!-- ══════════════ ADMIN VIEW ══════════════ -->
<div id="admin-view">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">FlossBot</div>
      <div class="sidebar-subtitle">OPERATOR CONSOLE</div>
      <nav class="sidebar-nav">
        <div class="nav-item active">
          <div class="nav-item-left">💬 实时对话</div>
          <span class="visitor-badge" id="visitor-count">0</span>
        </div>
      </nav>
      <div style="margin-top:16px;">
        <div style="font-size:10px;color:#4a5568;font-family:monospace;letter-spacing:1px;margin-bottom:8px;padding-left:4px;">在线访客</div>
        <div id="visitor-list" style="display:flex;flex-direction:column;gap:4px;">
          <div style="font-size:12px;color:#4a5568;padding:8px 12px;font-family:monospace;">暂无访客</div>
        </div>
      </div>
      <div class="sidebar-status" id="admin-status">
        <span class="status-dot disconnected" id="status-dot"></span>
        <span id="status-text">连接中…</span>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <div>
          <div class="admin-topbar-title">实时对话监控</div>
          <div class="admin-topbar-sub">以 FlossBot AI 身份回复访客消息 &nbsp;·&nbsp; 当前回复：<span id="active-visitor-label" style="color:#00d4aa;">暂无</span></div>
        </div>
        <button id="mode-btn" onclick="toggleMode()"
          style="font-size:13px; border:none; border-radius:8px; padding:6px 16px;
                 cursor:pointer; font-family:monospace; font-weight:700;
                 background:linear-gradient(135deg,#00d4aa,#0098ff); color:#000;">
          🤖 AI 自动中
        </button>
        <button onclick="clearHistory()"
          style="font-size:13px; border:1px solid rgba(239,68,68,0.4); border-radius:8px;
                 padding:6px 14px; cursor:pointer; font-family:monospace;
                 background:transparent; color:#ef4444;">
          🗑️ 清空记录
        </button>
        <a href="#" onclick="switchToVisitor()" class="preview-btn">预览访客界面 →</a>
      </div>

      <div class="admin-msg-area" id="admin-msg-area">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">👂</div>
          <div>等待访客发来消息…</div>
          <div style="font-size:11px;opacity:.5">把访客链接发给肉松，然后在这里坐等 😈</div>
        </div>
      </div>

      <div class="admin-reply-area">
        <div class="reply-label">
          以 <b style="color:var(--accent)">FlossBot AI</b> 身份回复
          <span class="reply-typing-hint" id="typing-hint" style="display:none">（访客正在看打字动画…）</span>
        </div>
        <div class="reply-input-row">
          <textarea class="admin-textarea" id="admin-input" placeholder="输入回复，Enter 发送…" rows="3"></textarea>
          <button class="admin-send-btn" id="admin-send-btn" disabled>发送 ↵</button>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
// ── 配置 ─────────────────────────────────────────────────
const WS_URL  = "wss://qvsrnjkbmkon.sealoshzh.site";

const uid  = () => Math.random().toString(36).slice(2,9);
const time = () => new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
const isAdmin = () => location.hash === "#admin";

// ── 视图切换 ─────────────────────────────────────────────
function render() {
  if (isAdmin()) {
    // 检查是否已登录
    if (sessionStorage.getItem("flossbot_auth")) {
      showAdminView();
    } else {
      showLoginView();
    }
  } else {
    document.getElementById("login-view").classList.remove("show");
    document.getElementById("visitor-view").style.display = "flex";
    document.getElementById("admin-view").style.display   = "none";
    initVisitor();
  }
}

function showLoginView() {
  document.getElementById("login-view").classList.add("show");
  document.getElementById("visitor-view").style.display = "none";
  document.getElementById("admin-view").style.display   = "none";
  setTimeout(() => document.getElementById("login-pwd").focus(), 100);
  // Enter 键提交
  document.getElementById("login-pwd").addEventListener("keydown", (e) => {
    if (e.key === "Enter") doLogin();
  });
}

function showAdminView() {
  document.getElementById("login-view").classList.remove("show");
  document.getElementById("visitor-view").style.display = "none";
  document.getElementById("admin-view").style.display   = "block";
  initAdmin();
}

window.addEventListener("hashchange", () => location.reload());
function switchToVisitor() { location.hash = ""; }

// ── 登录逻辑 ─────────────────────────────────────────────
let loginWs = null;

function doLogin() {
  const pwd = document.getElementById("login-pwd").value.trim();
  if (!pwd) return;

  const btn = document.getElementById("login-btn");
  const err = document.getElementById("login-error");
  btn.disabled = true;
  btn.textContent = "验证中…";
  err.textContent = "";

  // 通过 WebSocket 发送密码到服务器验证
  loginWs = new WebSocket(`${WS_URL}?role=admin`);

  loginWs.onopen = () => {
    loginWs.send(JSON.stringify({ type: "AUTH", payload: { password: pwd } }));
  };

  loginWs.onmessage = (e) => {
    const { type, payload } = JSON.parse(e.data);
    if (type === "AUTH_SUCCESS") {
      // 验证成功，存储登录状态
      sessionStorage.setItem("flossbot_auth", payload.token);
      loginWs.close();
      showAdminView();
    }
    if (type === "AUTH_FAIL") {
      btn.disabled = false;
      btn.textContent = "进入后台 →";
      err.textContent = "❌ 密码错误，请重试";
      // 抖动效果
      const shell = document.querySelector(".login-shell");
      shell.classList.add("login-shake");
      setTimeout(() => shell.classList.remove("login-shake"), 400);
      document.getElementById("login-pwd").value = "";
      document.getElementById("login-pwd").focus();
    }
  };

  loginWs.onerror = () => {
    btn.disabled = false;
    btn.textContent = "进入后台 →";
    err.textContent = "⚠ 服务器连接失败，请稍后重试";
  };
}

// ══════════════════════════════════════════════════════════
//  VISITOR
// ══════════════════════════════════════════════════════════
let visitorWs = null;

// ── 联网搜索开关 ─────────────────────────────────────
let webSearchEnabled = false;

function toggleWebSearch() {
  webSearchEnabled = !webSearchEnabled;
  const toggle = document.getElementById("ws-toggle");
  const label  = document.getElementById("ws-label");
  if (webSearchEnabled) {
    toggle.classList.add("on");
    toggle.setAttribute("aria-pressed", "true");
    label.classList.add("on");
    label.textContent = "已开启";
  } else {
    toggle.classList.remove("on");
    toggle.setAttribute("aria-pressed", "false");
    label.classList.remove("on");
    label.textContent = "已关闭";
  }
  if (visitorWs && visitorWs.readyState === 1) {
    visitorWs.send(JSON.stringify({ type: "TOGGLE_WEBSEARCH", payload: { enabled: webSearchEnabled } }));
  }
}

function initVisitor() {
  appendAIMsg("你好！我是 FlossBot，有什么可以帮你的吗？✨");
  connectVisitor();
  const input   = document.getElementById("visitor-input");
  const sendBtn = document.getElementById("send-btn");
  input.addEventListener("input", () => {
    sendBtn.disabled = !input.value.trim();
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendVisitorMsg(); }
  });
  sendBtn.addEventListener("click", sendVisitorMsg);
}

function connectVisitor() {
  visitorWs = new WebSocket(`${WS_URL}?role=visitor`);
  visitorWs.onopen = () => {
    visitorWsForSearch = visitorWs;
    document.getElementById("send-btn").disabled = false;
    document.getElementById("conn-banner").classList.remove("show");
  };
  visitorWs.onmessage = (e) => {
    const { type, payload } = JSON.parse(e.data);
    if (type === "OPERATOR_TYPING") { payload ? showTyping() : hideTyping(); }
    if (type === "OPERATOR_REPLY")  { hideTyping(); appendAIMsg(payload.text); }
  };
  visitorWs.onclose = () => {
    document.getElementById("send-btn").disabled = true;
    document.getElementById("conn-banner").classList.add("show");
    setTimeout(connectVisitor, 3000);
  };
  visitorWs.onerror = () => visitorWs.close();
}

function sendVisitorMsg() {
  const input = document.getElementById("visitor-input");
  const text  = input.value.trim();
  if (!text || !visitorWs || visitorWs.readyState !== 1) return;
  const msg = { id: uid(), role: "user", text, time: time() };
  appendUserMsg(text);
  visitorWs.send(JSON.stringify({ type: "USER_MESSAGE", payload: msg }));
  input.value = "";
  input.style.height = "auto";
  document.getElementById("send-btn").disabled = true;
}

let typingEl = null;
function showTyping() {
  if (typingEl) return;
  const area = document.getElementById("msg-area");
  typingEl = document.createElement("div");
  typingEl.className = "msg-row ai";
  typingEl.innerHTML = `
    <div class="bubble-avatar">🤖</div>
    <div class="bubble">
      <div class="bubble-text">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  area.appendChild(typingEl);
  scrollBottom();
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function appendAIMsg(text) {
  hideTyping();
  const area = document.getElementById("msg-area");
  const row  = document.createElement("div");
  row.className = "msg-row ai";
  row.innerHTML = `
    <div class="bubble-avatar">🤖</div>
    <div class="bubble">
      <div class="bubble-text">${escHtml(text)}</div>
      <div class="bubble-time">${time()}</div>
    </div>`;
  area.appendChild(row);
  scrollBottom();
}

function appendUserMsg(text) {
  const area = document.getElementById("msg-area");
  const row  = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `
    <div class="bubble" style="align-items:flex-end">
      <div class="bubble-text">${escHtml(text)}</div>
      <div class="bubble-time">${time()}</div>
    </div>`;
  area.appendChild(row);
  scrollBottom();
}

function scrollBottom() {
  const area = document.getElementById("msg-area");
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

// ══════════════════════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════════════════════
let adminWs      = null;
let isTypingSent = false;
let typingTimer  = null;

function toggleMode() { sendAdmin({ type: "TOGGLE_MODE" }); }
function selectVisitor(num) { sendAdmin({ type: "SELECT_VISITOR", payload: { num } }); }
function clearHistory() {
  if (!confirm("确定清空所有消息记录？此操作不可撤销。")) return;
  sendAdmin({ type: "CLEAR_HISTORY" });
}

function initAdmin() {
  connectAdmin();
  const input   = document.getElementById("admin-input");
  const sendBtn = document.getElementById("admin-send-btn");
  input.addEventListener("input", () => {
    sendBtn.disabled = !input.value.trim();
    if (!isTypingSent) {
      isTypingSent = true;
      sendAdmin({ type: "OPERATOR_TYPING", payload: true });
      document.getElementById("typing-hint").style.display = "inline";
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      isTypingSent = false;
      sendAdmin({ type: "OPERATOR_TYPING", payload: false });
      document.getElementById("typing-hint").style.display = "none";
    }, 1500);
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendAdminReply(); }
  });
  sendBtn.addEventListener("click", sendAdminReply);
}

function connectAdmin() {
  adminWs = new WebSocket(`${WS_URL}?role=admin`);
  adminWs.onopen = () => {
    // 连接后立即发送密码认证（从 sessionStorage 取 token 不行，直接重新认证）
    // 这里 sessionStorage 只是前端标志位，真正的认证还是每次连接时发密码
    // 所以需要把密码存一下（只存在内存里）
    if (_adminPwd) {
      adminWs.send(JSON.stringify({ type: "AUTH", payload: { password: _adminPwd } }));
    } else {
      // token 过期或刷新了页面，重新去登录
      sessionStorage.removeItem("flossbot_auth");
      location.reload();
    }
  };

  adminWs.onmessage = (e) => {
    const { type, payload } = JSON.parse(e.data);

    if (type === "AUTH_SUCCESS") {
      setAdminStatus(true);
      return;
    }
    if (type === "AUTH_FAIL") {
      sessionStorage.removeItem("flossbot_auth");
      location.reload();
      return;
    }

    if (type === "SERVER_INFO") {
      document.getElementById("visitor-count").textContent = payload.visitors;
      updateModeBtn(payload.aiMode);
      updateVisitorList(payload.visitorList || []);
      updateActiveLabel(payload.activeVisitorNum);
      if (payload.history && payload.history.length > 0) {
        document.getElementById("empty-state")?.remove();
        payload.history.forEach(msg => {
          const label = msg.num ? `访客${msg.num}` : null;
          appendAdminMsg(msg.role, msg.text, msg.time, label);
        });
        appendSysEvent("── 以上为历史消息 ──");
      }
    }
    if (type === "VISITOR_JOINED") {
      document.getElementById("visitor-count").textContent = payload.count;
      updateVisitorList(payload.list || []);
      appendSysEvent(`访客${payload.num} 已连接（在线: ${payload.count}）`);
    }
    if (type === "VISITOR_LEFT") {
      document.getElementById("visitor-count").textContent = payload.count;
      updateVisitorList(payload.list || []);
      updateActiveLabel(payload.activeVisitorNum);
      appendSysEvent(`访客${payload.num} 已离开（在线: ${payload.count}）`);
    }
    if (type === "VISITOR_LIST") { updateVisitorList(payload.list || []); }
    if (type === "USER_MESSAGE") {
      document.getElementById("empty-state")?.remove();
      appendAdminMsg("visitor", payload.text, payload.time, `访客${payload.visitorNum}`);
    }
    if (type === "MODE_CHANGE") {
      updateModeBtn(payload.aiMode);
      appendSysEvent(payload.aiMode ? "已切换为 🤖 AI 自动模式" : "已切换为 🙋 人工接管模式");
    }
    if (type === "AI_REPLY") {
      const icon = payload.webSearch ? "🌐🤖" : "🤖";
      appendAdminMsg("operator", `${icon} ${payload.text}`, time(), `→ 访客${payload.visitorNum}`);
    }
    if (type === "ACTIVE_VISITOR_CHANGED") { updateActiveLabel(payload.num); }
    if (type === "VISITOR_WEBSEARCH_CHANGED") {
      const v = cachedVisitorList.find(v => v.num === payload.num);
      if (v) v.webSearch = payload.webSearch;
      updateVisitorList(null);
      appendSysEvent(`访客${payload.num} ${payload.webSearch ? "🌐 开启了联网搜索" : "关闭了联网搜索"}`);
    }
    if (type === "HISTORY_CLEARED") {
      document.getElementById("admin-msg-area").innerHTML =
        `<div class="empty-state" id="empty-state">
          <div class="empty-icon">🗑️</div>
          <div>消息记录已清空</div>
        </div>`;
      appendSysEvent("── 消息记录已清空 ──");
    }
    if (type === "SYS_MSG") { appendSysEvent(payload.text); }
  };

  adminWs.onclose = () => {
    setAdminStatus(false);
    setTimeout(connectAdmin, 3000);
  };
  adminWs.onerror = () => adminWs.close();
}

// 访客列表缓存
let cachedVisitorList = [];

function updateVisitorList(list) {
  if (list) cachedVisitorList = list;
  const el = document.getElementById("visitor-list");
  if (!el) return;
  const renderList = cachedVisitorList;
  if (renderList.length === 0) {
    el.innerHTML = `<div style="font-size:12px;color:#4a5568;padding:8px 12px;font-family:monospace;">暂无访客</div>`;
    return;
  }
  el.innerHTML = renderList.map(v => `
    <div onclick="selectVisitor(${v.num})" style="
      display:flex; align-items:center; gap:8px;
      padding:8px 12px; border-radius:8px; cursor:pointer;
      background:${v.active ? "rgba(0,212,170,0.15)" : "rgba(255,255,255,0.03)"};
      border:1px solid ${v.active ? "rgba(0,212,170,0.3)" : "transparent"};
      transition:all .15s;
    ">
      <span style="width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;box-shadow:0 0 4px #22c55e;"></span>
      <span style="font-size:13px;color:${v.active ? "#00d4aa" : "#e2e8f0"};font-family:monospace;">访客${v.num}</span>
      ${v.webSearch ? '<span style="font-size:10px;color:#f59e0b;margin-left:2px;">🌐</span>' : ''}
      ${v.active ? '<span style="font-size:10px;color:#00d4aa;margin-left:auto;">回复中</span>' : ''}
    </div>
  `).join("");
}

function updateActiveLabel(num) {
  const el = document.getElementById("active-visitor-label");
  if (el) el.textContent = num ? `访客${num}` : "暂无";
}

function updateModeBtn(aiMode) {
  const btn = document.getElementById("mode-btn");
  if (!btn) return;
  if (aiMode) {
    btn.textContent = "🤖 AI 自动中";
    btn.style.background = "linear-gradient(135deg,#00d4aa,#0098ff)";
    btn.style.color = "#000";
  } else {
    btn.textContent = "🙋 人工接管中";
    btn.style.background = "linear-gradient(135deg,#f97316,#ef4444)";
    btn.style.color = "#fff";
  }
}

function sendAdmin(data) {
  if (adminWs && adminWs.readyState === 1) adminWs.send(JSON.stringify(data));
}

function sendAdminReply() {
  const input = document.getElementById("admin-input");
  const text  = input.value.trim();
  if (!text) return;
  clearTimeout(typingTimer);
  isTypingSent = false;
  sendAdmin({ type: "OPERATOR_TYPING", payload: false });
  sendAdmin({ type: "OPERATOR_REPLY", payload: { text } });
  document.getElementById("typing-hint").style.display = "none";
  appendAdminMsg("operator", text, time());
  input.value = "";
  document.getElementById("admin-send-btn").disabled = true;
  input.focus();
}

function appendAdminMsg(role, text, t, label) {
  const area = document.getElementById("admin-msg-area");
  const row  = document.createElement("div");
  const isOp = role === "operator";
  row.className = `admin-msg-row from-${isOp ? "admin" : "visitor"}`;
  row.innerHTML = `
    <div class="admin-avatar ${isOp ? "operator" : "visitor"}">${isOp ? "🤖" : "👤"}</div>
    <div class="admin-bubble-wrap">
      <div class="admin-bubble-meta">${label || (isOp ? "FlossBot（你）" : "访客")} · ${t || time()}</div>
      <div class="admin-bubble-text">${escHtml(text)}</div>
    </div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function appendSysEvent(msg) {
  const area = document.getElementById("admin-msg-area");
  const el   = document.createElement("div");
  el.className = "sys-event";
  el.textContent = msg;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function setAdminStatus(connected) {
  document.getElementById("status-dot").className = `status-dot ${connected ? "connected" : "disconnected"}`;
  document.getElementById("status-text").textContent = connected ? "已连接" : "重连中…";
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

// ── 密码暂存（仅内存，不写 localStorage） ────────────────
let _adminPwd = null;

// 拦截登录成功后进入 admin，把密码存到内存
const _origDoLogin = doLogin;
// 重写 showAdminView 记录密码
const _origShowAdmin = showAdminView;

// 在 doLogin 里拦截密码
function doLogin() {
  const pwd = document.getElementById("login-pwd").value.trim();
  if (!pwd) return;
  _adminPwd = pwd;  // 存到内存

  const btn = document.getElementById("login-btn");
  const err = document.getElementById("login-error");
  btn.disabled = true;
  btn.textContent = "验证中…";
  err.textContent = "";

  loginWs = new WebSocket(`${WS_URL}?role=admin`);
  loginWs.onopen = () => {
    loginWs.send(JSON.stringify({ type: "AUTH", payload: { password: pwd } }));
  };
  loginWs.onmessage = (e) => {
    const { type, payload } = JSON.parse(e.data);
    if (type === "AUTH_SUCCESS") {
      sessionStorage.setItem("flossbot_auth", "1");
      loginWs.close();
      showAdminView();
    }
    if (type === "AUTH_FAIL") {
      _adminPwd = null;
      btn.disabled = false;
      btn.textContent = "进入后台 →";
      err.textContent = "❌ 密码错误，请重试";
      const shell = document.querySelector(".login-shell");
      shell.classList.add("login-shake");
      setTimeout(() => shell.classList.remove("login-shake"), 400);
      document.getElementById("login-pwd").value = "";
      document.getElementById("login-pwd").focus();
    }
  };
  loginWs.onerror = () => {
    btn.disabled = false;
    btn.textContent = "进入后台 →";
    err.textContent = "⚠ 服务器连接失败，请稍后重试";
  };
}

render();
</script>
</body>
</html>
